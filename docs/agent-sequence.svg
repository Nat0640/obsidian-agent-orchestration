<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 680" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#fb923c"/>
    </marker>
    <marker id="arrow-emerald-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#34d399"/>
    </marker>
    <marker id="arrow-blue-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- 1. Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 2. Lifelines -->
  <line x1="100" y1="75" x2="100" y2="630" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="75" x2="280" y2="630" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="480" y1="75" x2="480" y2="630" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="680" y1="75" x2="680" y2="630" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="880" y1="75" x2="880" y2="630" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 3. Activation Bars -->
  <!-- User/Telegram -->
  <rect x="95" y="105" width="10" height="85" rx="2" fill="rgba(8, 51, 68, 0.6)" stroke="#22d3ee" stroke-width="1"/>
  
  <!-- Hermes-agent -->
  <rect x="275" y="105" width="10" height="45" rx="2" fill="rgba(6, 78, 59, 0.6)" stroke="#34d399" stroke-width="1"/>
  <rect x="275" y="245" width="10" height="95" rx="2" fill="rgba(6, 78, 59, 0.6)" stroke="#34d399" stroke-width="1"/>

  <!-- Antigravity CLI -->
  <rect x="475" y="175" width="10" height="425" rx="2" fill="rgba(30, 41, 59, 0.8)" stroke="#60a5fa" stroke-width="1"/>

  <!-- Claude Code -->
  <rect x="675" y="395" width="10" height="125" rx="2" fill="rgba(136, 19, 55, 0.6)" stroke="#fb7185" stroke-width="1"/>

  <!-- Obsidian Vault -->
  <rect x="875" y="130" width="10" height="20" rx="2" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="875" y="200" width="10" height="20" rx="2" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="875" y="280" width="10" height="20" rx="2" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="875" y="430" width="10" height="20" rx="2" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="875" y="470" width="10" height="20" rx="2" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="875" y="550" width="10" height="20" rx="2" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1"/>

  <!-- 4. Alt / Conditional Frame for Claude Code -->
  <rect x="50" y="360" width="880" height="180" rx="4" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="360" width="50" height="18" rx="4" fill="rgba(30,41,59,0.8)" stroke="#64748b" stroke-width="1"/>
  <text x="75" y="372" fill="#94a3b8" font-size="8" font-weight="600" text-anchor="middle">alt</text>
  <text x="110" y="372" fill="#94a3b8" font-size="8" font-style="italic">[If task requires local compilation &amp; code editing]</text>

  <!-- ==================== MESSAGES & TIMELINE ==================== -->
  
  <!-- 1a. User Telegram -> Hermes-agent -->
  <line x1="100" y1="110" x2="280" y2="110" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="190" y="102" fill="#34d399" font-size="8" font-weight="600" text-anchor="middle">1a. Voice/Text (Telegram)</text>

  <!-- 2a. Hermes-agent -> Vault (Inbox) -->
  <line x1="280" y1="140" x2="880" y2="140" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="580" y="132" fill="#e2e8f0" font-size="8" text-anchor="middle">2a. Write Raw Note to 00 Inbox/</text>

  <!-- 1b. User IDE -> Antigravity CLI -->
  <line x1="100" y1="180" x2="480" y2="180" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="290" y="172" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle">1b. Trigger Goal/Prompt (IDE Chat)</text>

  <!-- 2. Antigravity -> Vault (Spec) -->
  <line x1="480" y1="210" x2="880" y2="210" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="680" y="202" fill="#e2e8f0" font-size="8" text-anchor="middle">2. Init Pipeline Spec (Set Lock: AGY)</text>

  <!-- 3. Antigravity -> Hermes-agent -->
  <line x1="480" y1="250" x2="280" y2="250" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-emerald)"/>
  <text x="380" y="242" fill="#34d399" font-size="8" font-weight="600" text-anchor="middle">3. Run Workflow trigger</text>

  <!-- 4. Hermes <-> Vault (Spec) -->
  <line x1="280" y1="290" x2="880" y2="290" stroke="#fb923c" stroke-width="1.5" marker-start="url(#arrow-orange-rev)" marker-end="url(#arrow-orange)"/>
  <text x="580" y="282" fill="#fb923c" font-size="8" text-anchor="middle">4. Poll Spec &amp; Update logs (State: Running)</text>

  <!-- 5. Hermes -> User (Telegram) -->
  <line x1="280" y1="330" x2="100" y2="330" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
  <text x="190" y="322" fill="#94a3b8" font-size="8" font-style="italic" text-anchor="middle">5. Progress Notification (Telegram)</text>

  <!-- 6. Antigravity -> Claude Code (Inside Alt) -->
  <line x1="480" y1="400" x2="680" y2="400" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="580" y="392" fill="#60a5fa" font-size="8" font-weight="600" text-anchor="middle">6. Delegate to Claude Code (Spec)</text>

  <!-- 7a. Claude Code <-> Vault (Spec) (Inside Alt) -->
  <line x1="680" y1="440" x2="880" y2="440" stroke="#fb923c" stroke-width="1.5" marker-start="url(#arrow-orange-rev)" marker-end="url(#arrow-orange)"/>
  <text x="780" y="432" fill="#fb923c" font-size="8" text-anchor="middle">7a. Write logs / Release Lock (State: Complete)</text>

  <!-- 7b. Claude Code <-> Vault (Notes) (Inside Alt) -->
  <line x1="680" y1="480" x2="880" y2="480" stroke="#60a5fa" stroke-width="1.5" marker-start="url(#arrow-blue-rev)" marker-end="url(#arrow-blue)"/>
  <text x="780" y="472" fill="#e2e8f0" font-size="8" text-anchor="middle">7b. Compile / Test &amp; Edit Project Files</text>

  <!-- Return Claude -> Antigravity (Inside Alt) -->
  <line x1="680" y1="510" x2="480" y2="510" stroke="#60a5fa" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="580" y="502" fill="#94a3b8" font-size="8" font-style="italic" text-anchor="middle">Return execution outputs</text>

  <!-- 8. Antigravity -> Vault (Daily Note) -->
  <line x1="480" y1="560" x2="880" y2="560" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="680" y="552" fill="#e2e8f0" font-size="8" text-anchor="middle">8. Final Activity Log (Daily Note)</text>

  <!-- 9. Antigravity -> User (IDE) -->
  <line x1="480" y1="600" x2="100" y2="600" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-cyan)"/>
  <text x="290" y="592" fill="#94a3b8" font-size="8" font-style="italic" text-anchor="middle">9. Present findings &amp; generated files</text>

  <!-- ==================== ACTOR BOXES (TOP OVERLAPPING) ==================== -->
  
  <!-- User / Developer -->
  <rect x="30" y="20" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="30" y="20" width="140" height="45" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="100" y="45" fill="white" font-size="11" font-weight="700" text-anchor="middle">User / Developer</text>
  
  <!-- Hermes-agent -->
  <rect x="210" y="20" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="210" y="20" width="140" height="45" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="280" y="45" fill="white" font-size="11" font-weight="700" text-anchor="middle">Hermes-agent</text>

  <!-- Antigravity CLI -->
  <rect x="410" y="20" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="410" y="20" width="140" height="45" rx="6" fill="rgba(30, 41, 59, 0.6)" stroke="#60a5fa" stroke-width="2"/>
  <text x="480" y="45" fill="white" font-size="11" font-weight="700" text-anchor="middle">Antigravity CLI</text>

  <!-- Claude Code -->
  <rect x="610" y="20" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="610" y="20" width="140" height="45" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="680" y="45" fill="white" font-size="11" font-weight="700" text-anchor="middle">Claude Code</text>

  <!-- Obsidian Vault -->
  <rect x="810" y="20" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="810" y="20" width="140" height="45" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="880" y="45" fill="white" font-size="11" font-weight="700" text-anchor="middle">Obsidian Vault</text>

  <!-- ==================== TITLE BLOCK ==================== -->
  <text x="30" y="650" fill="white" font-size="12" font-weight="700">Agent Task Sequence &amp; State Synchronization Timeline</text>
  <text x="30" y="665" fill="#94a3b8" font-size="8">Sequence representation of Telegram inputs, file-based Pipeline Spec status updates, locking triggers, and final logging gates</text>
</svg>
